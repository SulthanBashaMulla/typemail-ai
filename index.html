<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>TypeMail AI</title>
        <link rel="stylesheet" href="style.css" />
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
          </head>
          <body>
            <div class="app">

                <!-- Header -->
                    <header>
                          <div class="logo">✉️ TypeMail AI</div>
                                <p class="tagline">Relationship-Aware AI Email Writer</p>
                                    </header>

                                        <!-- Main Form -->
                                            <main>
                                                  <div class="card">

                                                          <!-- Recipient Type -->
                                                                  <div class="form-group">
                                                                            <label>Who are you writing to?</label>
                                                                                      <div class="chip-group" id="recipientGroup">
                                                                                                  <button class="chip active" data-value="professor">👨‍🏫 Professor</button>
                                                                                                              <button class="chip" data-value="recruiter">💼 Recruiter</button>
                                                                                                                          <button class="chip" data-value="client">🤝 Client</button>
                                                                                                                                      <button class="chip" data-value="manager">👔 Manager</button>
                                                                                                                                                  <button class="chip" data-value="friend">😊 Friend</button>
                                                                                                                                                              <button class="chip" data-value="investor">💰 Investor</button>
                                                                                                                                                                        </div>
                                                                                                                                                                                </div>

                                                                                                                                                                                        <!-- Tone -->
                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                          <label>Tone</label>
                                                                                                                                                                                                                    <div class="chip-group" id="toneGroup">
                                                                                                                                                                                                                                <button class="chip active" data-value="formal">🎩 Formal</button>
                                                                                                                                                                                                                                            <button class="chip" data-value="friendly">😊 Friendly</button>
                                                                                                                                                                                                                                                        <button class="chip" data-value="assertive">💪 Assertive</button>
                                                                                                                                                                                                                                                                    <button class="chip" data-value="apologetic">🙏 Apologetic</button>
                                                                                                                                                                                                                                                                                <button class="chip" data-value="grateful">🙌 Grateful</button>
                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                          <!-- Purpose -->
                                                                                                                                                                                                                                                                                                                  <div class="form-group">
                                                                                                                                                                                                                                                                                                                            <label>What do you want to say?</label>
                                                                                                                                                                                                                                                                                                                                      <textarea id="purpose" placeholder="e.g. Ask my professor for an assignment deadline extension because I was sick..."></textarea>
                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                      <!-- Your Name -->
                                                                                                                                                                                                                                                                                                                                                              <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                        <label>Your Name</label>
                                                                                                                                                                                                                                                                                                                                                                                  <input type="text" id="senderName" placeholder="e.g. Sulthan Basha" />
                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                  <button id="generateBtn" onclick="generateEmail()">
                                                                                                                                                                                                                                                                                                                                                                                                            ✨ Generate Email
                                                                                                                                                                                                                                                                                                                                                                                                                    </button>

                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- Output Section -->
                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="output-card hidden" id="outputCard">

                                                                                                                                                                                                                                                                                                                                                                                                                                              <!-- Response Likelihood -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="likelihood-bar">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span class="likelihood-label">Response Likelihood</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="bar-track">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="bar-fill" id="likelihoodBar"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <span class="likelihood-percent" id="likelihoodPercent">0%</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <!-- Subject Lines -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h3>📌 Suggested Subject Lines</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div id="subjectLines" class="subject-list"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <!-- Generated Email -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="section-header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3>📧 Generated Email</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="copy-btn" onclick="copyEmail()">📋 Copy</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="emailOutput" class="email-box"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- Follow-up -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <h3>🔄 Follow-up Suggestion</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="followUp" class="followup-box"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- Loading -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="loading hidden" id="loading">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="spinner"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p>TypeMail AI is writing your email...</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <footer>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <p>Built with GitHub Copilot & Microsoft AI ⚡</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </footer>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </html>
